image:
  repository: ghcr.io/andreat2009/tsatech-api-gateway
  tag: latest
  digest: ""
  pullPolicy: Always

global:
  domain: "apps.example.invalid"
  platformNamespace: "platform"
  appNamespace: "ecommerce"

route:
  enabled: false
  host: ""
  tls:
    termination: passthrough
    insecureEdgeTerminationPolicy: Redirect
  annotations: {}

ingress:
  enabled: true
  className: nginx
  host: '{{ printf "%s-%s.%s" .Release.Name .Release.Namespace .Values.global.domain }}'
  path: /
  pathType: Prefix
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  tls:
    enabled: true
    secretName: wildcard-apps-tls

env:
  SERVER_PORT: "8443"
  SERVER_SSL_ENABLED: "false"
  KEYCLOAK_ISSUER_URI: '{{ printf "https://keycloak-%s.%s/realms/master" .Values.global.platformNamespace .Values.global.domain }}'
  KEYCLOAK_JWK_SET_URI: '{{ printf "http://keycloak.%s.svc.cluster.local/realms/master/protocol/openid-connect/certs" .Values.global.platformNamespace }}'
  REVIEW_SERVICE_URL: '{{ printf "http://review-service.%s.svc.cluster.local:8443" .Values.global.appNamespace }}'
  WISHLIST_SERVICE_URL: '{{ printf "http://wishlist-service.%s.svc.cluster.local:8443" .Values.global.appNamespace }}'
  RETURNS_SERVICE_URL: '{{ printf "http://returns-service.%s.svc.cluster.local:8443" .Values.global.appNamespace }}'
  COUPON_SERVICE_URL: '{{ printf "http://coupon-service.%s.svc.cluster.local:8443" .Values.global.appNamespace }}'
  NEWSLETTER_SERVICE_URL: '{{ printf "http://newsletter-service.%s.svc.cluster.local:8443" .Values.global.appNamespace }}'
  REWARD_SERVICE_URL: '{{ printf "http://reward-service.%s.svc.cluster.local:8443" .Values.global.appNamespace }}'
  TRANSACTION_SERVICE_URL: '{{ printf "http://transaction-service.%s.svc.cluster.local:8443" .Values.global.appNamespace }}'
  SUBSCRIPTION_SERVICE_URL: '{{ printf "http://subscription-service.%s.svc.cluster.local:8443" .Values.global.appNamespace }}'
  DOWNLOAD_SERVICE_URL: '{{ printf "http://download-service.%s.svc.cluster.local:8443" .Values.global.appNamespace }}'
  CMS_SERVICE_URL: '{{ printf "http://cms-service.%s.svc.cluster.local:8443" .Values.global.appNamespace }}'
  BLOG_SERVICE_URL: '{{ printf "http://blog-service.%s.svc.cluster.local:8443" .Values.global.appNamespace }}'
  CONTACT_SERVICE_URL: '{{ printf "http://contact-service.%s.svc.cluster.local:8443" .Values.global.appNamespace }}'
  CATALOG_SERVICE_URL: '{{ printf "http://catalog-service.%s.svc.cluster.local:8443" .Values.global.appNamespace }}'
  CUSTOMER_SERVICE_URL: '{{ printf "http://customer-service.%s.svc.cluster.local:8443" .Values.global.appNamespace }}'
  CART_SERVICE_URL: '{{ printf "http://cart-service.%s.svc.cluster.local:8443" .Values.global.appNamespace }}'
  ORDER_SERVICE_URL: '{{ printf "http://order-service.%s.svc.cluster.local:8443" .Values.global.appNamespace }}'
  INVENTORY_SERVICE_URL: '{{ printf "http://inventory-service.%s.svc.cluster.local:8443" .Values.global.appNamespace }}'
  PRICING_SERVICE_URL: '{{ printf "http://pricing-service.%s.svc.cluster.local:8443" .Values.global.appNamespace }}'
  PAYMENT_SERVICE_URL: '{{ printf "http://payment-service.%s.svc.cluster.local:8443" .Values.global.appNamespace }}'
  SHIPPING_SERVICE_URL: '{{ printf "http://shipping-service.%s.svc.cluster.local:8443" .Values.global.appNamespace }}'
  NOTIFICATION_SERVICE_URL: '{{ printf "http://notification-service.%s.svc.cluster.local:8443" .Values.global.appNamespace }}'

secret:
  name: api-gateway-secret
  create: false
  data: {}

secretEnv: {}

tls:
  enabled: false
  secretName: wildcard-apps-tls

truststore:
  enabled: false
  secretName: platform-truststore
  mountPath: /etc/ssl/openshift
  password: changeit

readinessProbe:
  scheme: HTTP
  path: /actuator/health
  initialDelaySeconds: 10
  periodSeconds: 10

livenessProbe:
  scheme: HTTP
  path: /actuator/health
  initialDelaySeconds: 20
  periodSeconds: 20
