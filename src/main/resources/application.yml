server:
  port: ${SERVER_PORT:8080}
  ssl:
    enabled: ${SERVER_SSL_ENABLED:false}
    certificate: ${SERVER_SSL_CERT:/etc/tls/tls.crt}
    certificate-private-key: ${SERVER_SSL_KEY:/etc/tls/tls.key}

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  application:
    name: api-gateway
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:https://keycloak-platform.apps-crc.testing/realms/master}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:https://keycloak-platform.apps-crc.testing/realms/master/protocol/openid-connect/certs}
  cloud:
    gateway:
      httpclient:
        ssl:
          trust-store: ${GATEWAY_SSL_TRUSTSTORE:/etc/ssl/openshift/truststore.jks}
          trust-store-password: ${GATEWAY_SSL_TRUSTSTORE_PASSWORD:changeit}
          trust-store-type: ${GATEWAY_SSL_TRUSTSTORE_TYPE:JKS}
      default-filters:
        - RemoveRequestHeader=Cookie
      routes:

        - id: review
          uri: ${REVIEW_SERVICE_URL:https://review-service-ecommerce.apps-crc.testing}
          predicates:
            - Path=/api/catalog/reviews,/api/catalog/reviews/**,/api/catalog/products/*/reviews

        - id: wishlist
          uri: ${WISHLIST_SERVICE_URL:https://wishlist-service-ecommerce.apps-crc.testing}
          predicates:
            - Path=/api/customers/*/wishlist,/api/customers/*/wishlist/**

        - id: returns
          uri: ${RETURNS_SERVICE_URL:https://returns-service-ecommerce.apps-crc.testing}
          predicates:
            - Path=/api/orders/returns,/api/orders/returns/**

        - id: coupon
          uri: ${COUPON_SERVICE_URL:https://coupon-service-ecommerce.apps-crc.testing}
          predicates:
            - Path=/api/pricing/quote,/api/pricing/coupons,/api/pricing/coupons/**

        - id: newsletter
          uri: ${NEWSLETTER_SERVICE_URL:https://newsletter-service-ecommerce.apps-crc.testing}
          predicates:
            - Path=/api/customers/*/newsletter,/api/customers/*/newsletter/**

        - id: reward
          uri: ${REWARD_SERVICE_URL:https://reward-service-ecommerce.apps-crc.testing}
          predicates:
            - Path=/api/customers/*/rewards,/api/customers/*/rewards/**

        - id: transaction
          uri: ${TRANSACTION_SERVICE_URL:https://transaction-service-ecommerce.apps-crc.testing}
          predicates:
            - Path=/api/customers/*/transactions,/api/customers/*/transactions/**

        - id: subscription
          uri: ${SUBSCRIPTION_SERVICE_URL:https://subscription-service-ecommerce.apps-crc.testing}
          predicates:
            - Path=/api/customers/*/subscriptions,/api/customers/*/subscriptions/**

        - id: download
          uri: ${DOWNLOAD_SERVICE_URL:https://download-service-ecommerce.apps-crc.testing}
          predicates:
            - Path=/api/customers/*/downloads,/api/customers/*/downloads/**

        - id: cms
          uri: ${CMS_SERVICE_URL:https://cms-service-ecommerce.apps-crc.testing}
          predicates:
            - Path=/api/cms/information,/api/cms/information/**,/api/cms/settings,/api/cms/settings/**,/api/cms/analytics,/api/cms/analytics/**

        - id: blog
          uri: ${BLOG_SERVICE_URL:https://blog-service-ecommerce.apps-crc.testing}
          predicates:
            - Path=/api/cms/blog,/api/cms/blog/**

        - id: contact
          uri: ${CONTACT_SERVICE_URL:https://contact-service-ecommerce.apps-crc.testing}
          predicates:
            - Path=/api/cms/contact,/api/cms/contact/**

        - id: catalog
          uri: ${CATALOG_SERVICE_URL:https://catalog-service-ecommerce.apps-crc.testing}
          predicates:
            - Path=/api/catalog/**

        - id: customer
          uri: ${CUSTOMER_SERVICE_URL:https://customer-service-ecommerce.apps-crc.testing}
          predicates:
            - Path=/api/customers/**

        - id: cart
          uri: ${CART_SERVICE_URL:https://cart-service-ecommerce.apps-crc.testing}
          predicates:
            - Path=/api/carts/**

        - id: order
          uri: ${ORDER_SERVICE_URL:https://order-service-ecommerce.apps-crc.testing}
          predicates:
            - Path=/api/orders/**

        - id: inventory
          uri: ${INVENTORY_SERVICE_URL:https://inventory-service-ecommerce.apps-crc.testing}
          predicates:
            - Path=/api/inventory/**

        - id: pricing
          uri: ${PRICING_SERVICE_URL:https://pricing-service-ecommerce.apps-crc.testing}
          predicates:
            - Path=/api/pricing/**

        - id: payment
          uri: ${PAYMENT_SERVICE_URL:https://payment-service-ecommerce.apps-crc.testing}
          predicates:
            - Path=/api/payments/**

        - id: shipping
          uri: ${SHIPPING_SERVICE_URL:https://shipping-service-ecommerce.apps-crc.testing}
          predicates:
            - Path=/api/shipments/**

        - id: notification
          uri: ${NOTIFICATION_SERVICE_URL:https://notification-service-ecommerce.apps-crc.testing}
          predicates:
            - Path=/api/notifications/**

management:
  endpoints:
    web:
      exposure:
        include: health,info
